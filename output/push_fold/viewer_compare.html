<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Push/Fold Comparison: Original vs Fixed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg-0: #0a1628;
    --bg-1: #0f1d30;
    --bg-2: #142538;
    --bg-3: #1a2d42;
    --border: #1e3a5c;
    --border-active: #2a5f8f;
    --text-primary: #e8ecf0;
    --text-secondary: #7a9bb8;
    --text-muted: #3d6080;
    --accent: #018F69;
    --accent-glow: rgba(1,143,105,0.15);
    --c-pure-push: #017a5a;
    --c-high-push: #018F69;
    --c-med-high: #2ab88e;
    --c-mixed: #f0b429;
    --c-med-low: #e87040;
    --c-low: #d45050;
    --c-pure-fold: #1a2d42;
    --diff-promote: #00e676;
    --diff-demote: #ff5252;
    --diff-small: #ffd740;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-0);
    color: var(--text-primary);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.2;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 56px;
  }

  .header {
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .header .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
    align-items: flex-start;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .control-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-left: 2px;
  }
  .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg-3); border-color: var(--border-active); color: var(--text-primary); }
  .btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    padding: 14px 18px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    align-items: center;
  }
  .stats-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stats-item-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .stats-item-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .stats-item-value .orig { color: var(--c-med-low); }
  .stats-item-value .arrow { color: var(--text-muted); margin: 0 6px; }
  .stats-item-value .fixed { color: var(--c-high-push); }
  .stats-item-value .delta-pos { color: var(--diff-promote); font-size: 12px; margin-left: 6px; }
  .stats-item-value .delta-neg { color: var(--diff-demote); font-size: 12px; margin-left: 6px; }
  .stats-item-value .delta-zero { color: var(--text-muted); font-size: 12px; margin-left: 6px; }
  .stats-sep {
    width: 1px;
    height: 32px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* Grids side by side */
  .grids-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }
  @media (max-width: 960px) {
    .grids-row { grid-template-columns: 1fr; }
  }

  .grid-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .grid-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .grid-panel-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }
  .grid-panel-title .tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 8px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .tag-orig { background: rgba(232,112,64,0.15); color: var(--c-med-low); border: 1px solid rgba(232,112,64,0.3); }
  .tag-fixed { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(1,143,105,0.3); }

  .push-pct-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }
  .push-pct-badge span { color: var(--c-high-push); font-size: 16px; font-weight: 500; }

  .hand-grid-wrapper { overflow: auto; }
  .hand-grid {
    display: grid;
    grid-template-columns: 18px repeat(13, 1fr);
    grid-template-rows: 18px repeat(13, 1fr);
    gap: 2px;
    min-width: 380px;
  }
  .grid-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .hand-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    border: 2px solid transparent;
    overflow: hidden;
  }
  .hand-cell:hover {
    transform: scale(1.1);
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .cell-name {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .cell-pct {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.65);
    margin-top: 1px;
    line-height: 1;
  }

  /* Diff border styles on fixed grid cells */
  .diff-promote { border-color: var(--diff-promote) !important; box-shadow: 0 0 6px rgba(0,230,118,0.4); }
  .diff-demote  { border-color: var(--diff-demote)  !important; box-shadow: 0 0 6px rgba(255,82,82,0.4); }
  .diff-small   { border-color: var(--diff-small)   !important; box-shadow: 0 0 4px rgba(255,215,64,0.3); }

  /* Legend */
  .diff-legend {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    padding: 10px 14px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 28px;
  }
  .diff-legend-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-right: 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 2px solid transparent;
    background: var(--bg-2);
    flex-shrink: 0;
  }
  .legend-swatch.promote { border-color: var(--diff-promote); box-shadow: 0 0 4px rgba(0,230,118,0.4); }
  .legend-swatch.demote  { border-color: var(--diff-demote);  box-shadow: 0 0 4px rgba(255,82,82,0.4); }
  .legend-swatch.small   { border-color: var(--diff-small);   box-shadow: 0 0 3px rgba(255,215,64,0.3); }

  /* Diff table */
  .diff-section {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 32px;
  }
  .diff-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .diff-section h2 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .diff-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .diff-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .diff-table th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  .diff-table th:hover { color: var(--text-secondary); }
  .diff-table th .sort-icon { margin-left: 4px; opacity: 0.4; }
  .diff-table th.sorted .sort-icon { opacity: 1; color: var(--accent); }
  .diff-table td {
    padding: 7px 12px;
    border-bottom: 1px solid rgba(30,58,92,0.5);
    vertical-align: middle;
  }
  .diff-table tr:last-child td { border-bottom: none; }
  .diff-table tr:hover td { background: rgba(255,255,255,0.02); }

  .dt-hand { font-weight: 500; color: var(--text-primary); font-size: 13px; }
  .dt-orig  { color: var(--c-med-low); }
  .dt-fixed { color: var(--c-high-push); }
  .dt-delta-pos { color: var(--diff-promote); }
  .dt-delta-neg { color: var(--diff-demote); }
  .dt-delta-bar-wrap {
    width: 80px;
    height: 6px;
    background: var(--bg-2);
    border-radius: 3px;
    overflow: hidden;
    display: inline-block;
    vertical-align: middle;
    margin-left: 8px;
  }
  .dt-delta-bar { height: 100%; border-radius: 3px; }

  .dir-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .dir-promote { background: rgba(0,230,118,0.12); color: var(--diff-promote); }
  .dir-demote  { background: rgba(255,82,82,0.12);  color: var(--diff-demote); }
  .dir-small   { background: rgba(255,215,64,0.08); color: var(--diff-small); }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--bg-1);
    border: 1px solid var(--border-active);
    border-radius: 8px;
    padding: 10px 14px;
    pointer-events: none;
    z-index: 1000;
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    min-width: 160px;
  }
  .tooltip.visible { display: block; }
  .tt-hand { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; font-family: 'Syne', sans-serif; }
  .tt-row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 2px; }
  .tt-label { color: var(--text-muted); }
  .tt-val-orig  { color: var(--c-med-low); }
  .tt-val-fixed { color: var(--c-high-push); }
  .tt-val-delta-pos { color: var(--diff-promote); }
  .tt-val-delta-neg { color: var(--diff-demote); }
  .tt-val-delta-neu { color: var(--text-muted); }
</style>
</head>

<div class="container">
  <div class="header">
    <h1>Push/Fold Comparison</h1>
    <div class="subtitle">Original (1B MCCFR) vs Fixed (MC Equity) &bull; 4-max 8bb</div>
  </div>

  <div class="controls">
    <div class="control-group">
      <div class="control-label">Position</div>
      <div class="btn-group" id="position-group"></div>
    </div>
    <div class="control-group">
      <div class="control-label">Situation</div>
      <div class="btn-group" id="situation-group"></div>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar">
    <!-- populated by JS -->
  </div>

  <div class="diff-legend">
    <span class="diff-legend-label">Border key</span>
    <div class="legend-item"><div class="legend-swatch promote"></div> Promoted &gt;5pp</div>
    <div class="legend-item"><div class="legend-swatch demote"></div> Demoted &gt;5pp</div>
    <div class="legend-item"><div class="legend-swatch small"></div> Changed 1–5pp</div>
  </div>

  <div class="grids-row">
    <div class="grid-panel">
      <div class="grid-panel-header">
        <div class="grid-panel-title"><span class="tag tag-orig">Original</span> 1B MCCFR</div>
        <div class="push-pct-badge">Push: <span id="orig-push-pct">—</span>%</div>
      </div>
      <div class="hand-grid-wrapper">
        <div class="hand-grid" id="grid-orig"></div>
      </div>
    </div>
    <div class="grid-panel">
      <div class="grid-panel-header">
        <div class="grid-panel-title"><span class="tag tag-fixed">Fixed</span> MC Equity</div>
        <div class="push-pct-badge">Push: <span id="fixed-push-pct">—</span>%</div>
      </div>
      <div class="hand-grid-wrapper">
        <div class="hand-grid" id="grid-fixed"></div>
      </div>
    </div>
  </div>

  <div class="diff-section">
    <div class="diff-section-header">
      <h2>Changed Hands</h2>
      <div class="diff-count" id="diff-count"></div>
    </div>
    <table class="diff-table" id="diff-table">
      <thead>
        <tr>
          <th data-col="hand">Hand <span class="sort-icon">↕</span></th>
          <th data-col="orig">Original % <span class="sort-icon">↕</span></th>
          <th data-col="fixed">Fixed % <span class="sort-icon">↕</span></th>
          <th data-col="delta">Change <span class="sort-icon">↓</span></th>
          <th data-col="dir">Direction <span class="sort-icon">↕</span></th>
        </tr>
      </thead>
      <tbody id="diff-tbody"></tbody>
    </table>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-hand" id="tt-hand"></div>
  <div class="tt-row"><span class="tt-label">Original</span><span class="tt-val-orig" id="tt-orig"></span></div>
  <div class="tt-row"><span class="tt-label">Fixed</span><span class="tt-val-fixed" id="tt-fixed"></span></div>
  <div class="tt-row"><span class="tt-label">Change</span><span id="tt-delta"></span></div>
</div>

  if (row === col) return RANKS[row] + RANKS[row];
  if (col > row) return RANKS[row] + RANKS[col] + 's';
  return RANKS[col] + RANKS[row] + 'o';
}

function buildHandMap(hands) {
  const map = {};
  for (const h of hands) map[h.hand] = h.push;
  return map;
}

function fmt(v) { return (v * 100).toFixed(1) + '%'; }
function fmt2(v) { return (v * 100).toFixed(2) + '%'; }

function currentOrigSit() {
  return ORIGINAL.positions[state.posIdx].situations[state.sitIdx];
}
function currentFixedSit() {
  return FIXED.positions[state.posIdx].situations[state.sitIdx];
}

// ── Controls ──────────────────────────────────────────────────────────────────
function renderPositionButtons() {
  const grp = document.getElementById('position-group');
  grp.innerHTML = '';
  ORIGINAL.positions.forEach((pos, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (i === state.posIdx ? ' active' : '');
    btn.textContent = pos.name;
    btn.addEventListener('click', () => {
      state.posIdx = i;
      state.sitIdx = 0;
      renderPositionButtons();
      renderSituationButtons();
      renderAll();
    });
    grp.appendChild(btn);
  });
}

function renderSituationButtons() {
  const pos = ORIGINAL.positions[state.posIdx];
  const grp = document.getElementById('situation-group');
  grp.innerHTML = '';
  pos.situations.forEach((sit, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (i === state.sitIdx ? ' active' : '');
    btn.textContent = sit.facing === 'no action' ? 'No action' : 'vs ' + sit.facing.replace(' push','');
    btn.addEventListener('click', () => {
      state.sitIdx = i;
      renderSituationButtons();
      renderAll();
    });
    grp.appendChild(btn);
  });
}

// ── Stats bar ─────────────────────────────────────────────────────────────────
function renderStats() {
  const origSit  = currentOrigSit();
  const fixedSit = currentFixedSit();
  const delta = fixedSit.push_pct - origSit.push_pct;
  const deltaStr = (delta >= 0 ? '+' : '') + delta.toFixed(1) + ' pp';
  const deltaClass = delta > 0.05 ? 'delta-pos' : delta < -0.05 ? 'delta-neg' : 'delta-zero';

  // Hand-level counts
  const origMap  = buildHandMap(origSit.hands);
  const fixedMap = buildHandMap(fixedSit.hands);
  let promoted = 0, demoted = 0, smallChange = 0, unchanged = 0;
  for (const name of Object.keys(origMap)) {
    const d = ((fixedMap[name] ?? 0) - origMap[name]) * 100;
    const ad = Math.abs(d);
    if (ad > 5) { d > 0 ? promoted++ : demoted++; }
    else if (ad >= 1) smallChange++;
    else unchanged++;
  }

  document.getElementById('stats-bar').innerHTML = `
    <div class="stats-item">
      <div class="stats-item-label">Overall push %</div>
      <div class="stats-item-value">
        <span class="orig">${origSit.push_pct.toFixed(1)}%</span>
        <span class="arrow">→</span>
        <span class="fixed">${fixedSit.push_pct.toFixed(1)}%</span>
        <span class="${deltaClass}">${deltaStr}</span>
      </div>
    </div>
    <div class="stats-sep"></div>
    <div class="stats-item">
      <div class="stats-item-label">Promoted (&gt;5pp)</div>
      <div class="stats-item-value" style="color:var(--diff-promote)">${promoted} hands</div>
    </div>
    <div class="stats-item">
      <div class="stats-item-label">Demoted (&gt;5pp)</div>
      <div class="stats-item-value" style="color:var(--diff-demote)">${demoted} hands</div>
    </div>
    <div class="stats-item">
      <div class="stats-item-label">Small change (1–5pp)</div>
      <div class="stats-item-value" style="color:var(--diff-small)">${smallChange} hands</div>
    </div>
    <div class="stats-item">
      <div class="stats-item-label">Unchanged</div>
      <div class="stats-item-value" style="color:var(--text-muted)">${unchanged} hands</div>
    </div>
  `;
}

// ── Grid rendering ────────────────────────────────────────────────────────────
function buildGrid(gridId, handMap, handMapOther, isFixed) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';

  // Corner spacer
  grid.appendChild(document.createElement('div'));

  // Col labels
  RANKS.forEach(r => {
    const lbl = document.createElement('div');
    lbl.className = 'grid-label';
    lbl.textContent = r;
    grid.appendChild(lbl);
  });

  RANKS.forEach((_, ri) => {
    // Row label
    const rowLbl = document.createElement('div');
    rowLbl.className = 'grid-label';
    rowLbl.textContent = RANKS[ri];
    grid.appendChild(rowLbl);

    RANKS.forEach((_, ci) => {
      const handName = canonicalName(ri, ci);
      const push = handMap[handName] ?? 0;
      const pushOther = (handMapOther[handName] ?? 0);

      const cell = document.createElement('div');
      cell.className = 'hand-cell';
      cell.style.background = getColor(push);

      // Diff border on fixed grid
      if (isFixed) {
        const deltaAbs = Math.abs((push - pushOther) * 100);
        const deltaSign = (push - pushOther) * 100;
        if (deltaAbs > 5) {
          cell.classList.add(deltaSign > 0 ? 'diff-promote' : 'diff-demote');
        } else if (deltaAbs >= 1) {
          cell.classList.add('diff-small');
        }
      }

      const nameEl = document.createElement('div');
      nameEl.className = 'cell-name';
      nameEl.textContent = handName;

      const pctEl = document.createElement('div');
      pctEl.className = 'cell-pct';
      pctEl.textContent = push >= 0.005 ? (push * 100).toFixed(0) + '%' : '';

      cell.appendChild(nameEl);
      cell.appendChild(pctEl);

      const origPush = isFixed ? pushOther : push;
      const fixedPush = isFixed ? push : pushOther;

      cell.addEventListener('mouseenter', (e) => showTooltip(e, handName, origPush, fixedPush));
      cell.addEventListener('mousemove', moveTooltip);
      cell.addEventListener('mouseleave', hideTooltip);

      grid.appendChild(cell);
    });
  });
}

function renderGrids() {
  const origSit  = currentOrigSit();
  const fixedSit = currentFixedSit();
  const origMap  = buildHandMap(origSit.hands);
  const fixedMap = buildHandMap(fixedSit.hands);

  document.getElementById('orig-push-pct').textContent = origSit.push_pct.toFixed(1);
  document.getElementById('fixed-push-pct').textContent = fixedSit.push_pct.toFixed(1);

  buildGrid('grid-orig',  origMap,  fixedMap, false);
  buildGrid('grid-fixed', fixedMap, origMap,  true);
}

// ── Diff table ────────────────────────────────────────────────────────────────
function renderDiffTable() {
  const origSit  = currentOrigSit();
  const fixedSit = currentFixedSit();
  const origMap  = buildHandMap(origSit.hands);
  const fixedMap = buildHandMap(fixedSit.hands);

  const rows = [];
  for (const name of Object.keys(origMap)) {
    const o = origMap[name] ?? 0;
    const f = fixedMap[name] ?? 0;
    const delta = (f - o) * 100;
    if (Math.abs(delta) < 1) continue;
    rows.push({ hand: name, orig: o, fixed: f, delta });
  }

  // Sort
  rows.sort((a, b) => {
    let av = a[state.sortCol], bv = b[state.sortCol];
    if (state.sortCol === 'hand') { av = av; bv = bv; }
    if (state.sortCol === 'delta') { av = Math.abs(av); bv = Math.abs(bv); }
    if (state.sortCol === 'dir') {
      av = a.delta > 5 ? 2 : a.delta < -5 ? 0 : 1;
      bv = b.delta > 5 ? 2 : b.delta < -5 ? 0 : 1;
    }
    if (av < bv) return state.sortAsc ? -1 : 1;
    if (av > bv) return state.sortAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('diff-count').textContent = rows.length + ' hands changed ≥1pp';

  const tbody = document.getElementById('diff-tbody');
  tbody.innerHTML = '';

  const maxDelta = Math.max(...rows.map(r => Math.abs(r.delta)), 1);

  for (const row of rows) {
    const tr = document.createElement('tr');
    const adelta = Math.abs(row.delta);
    const isPromote = row.delta > 5;
    const isDemote  = row.delta < -5;
    const dirClass = isPromote ? 'dir-promote' : isDemote ? 'dir-demote' : 'dir-small';
    const dirLabel  = isPromote ? 'Promoted' : isDemote ? 'Demoted' : 'Small';
    const deltaClass = row.delta > 0 ? 'dt-delta-pos' : 'dt-delta-neg';
    const barColor = isPromote ? 'var(--diff-promote)' : isDemote ? 'var(--diff-demote)' : 'var(--diff-small)';
    const barWidth = (adelta / maxDelta * 80).toFixed(1);
    const sign = row.delta > 0 ? '+' : '';

    tr.innerHTML = `
      <td class="dt-hand">${row.hand}</td>
      <td class="dt-orig">${(row.orig*100).toFixed(1)}%</td>
      <td class="dt-fixed">${(row.fixed*100).toFixed(1)}%</td>
      <td class="${deltaClass}">
        ${sign}${row.delta.toFixed(1)} pp
        <span class="dt-delta-bar-wrap"><span class="dt-delta-bar" style="width:${barWidth}px;background:${barColor}"></span></span>
      </td>
      <td><span class="dir-badge ${dirClass}">${dirLabel}</span></td>
    `;
    tbody.appendChild(tr);
  }

  // Update sort icons
  document.querySelectorAll('.diff-table th').forEach(th => {
    const col = th.dataset.col;
    const icon = th.querySelector('.sort-icon');
    if (col === state.sortCol) {
      th.classList.add('sorted');
      icon.textContent = state.sortAsc ? '↑' : '↓';
    } else {
      th.classList.remove('sorted');
      icon.textContent = '↕';
    }
  });
}

// ── Table sort ────────────────────────────────────────────────────────────────
document.querySelectorAll('.diff-table th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (state.sortCol === col) {
      state.sortAsc = !state.sortAsc;
    } else {
      state.sortCol = col;
      state.sortAsc = col === 'hand';
    }
    renderDiffTable();
  });
});

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(e, hand, orig, fixed) {
  document.getElementById('tt-hand').textContent = hand;
  document.getElementById('tt-orig').textContent  = fmt2(orig);
  document.getElementById('tt-fixed').textContent = fmt2(fixed);
  const d = (fixed - orig) * 100;
  const sign = d >= 0 ? '+' : '';
  const el = document.getElementById('tt-delta');
  el.textContent = sign + d.toFixed(2) + ' pp';
  el.className = d > 0.5 ? 'tt-val-delta-pos' : d < -0.5 ? 'tt-val-delta-neg' : 'tt-val-delta-neu';
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  const x = e.clientX + 16, y = e.clientY - 10;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth  ? e.clientX - tw - 8 : x) + 'px';
  tooltip.style.top  = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

// ── Render all ────────────────────────────────────────────────────────────────
function renderAll() {
  renderStats();
  renderGrids();
  renderDiffTable();
}

// ── Init ──────────────────────────────────────────────────────────────────────
// Default: BB facing CO+BTN+SB push (most interesting changed situation)
// BB is index 3, CO+BTN+SB push is last situation (index 6)
state.posIdx = 3;
state.sitIdx = ORIGINAL.positions[3].situations.length - 1;

renderPositionButtons();
renderSituationButtons();
renderAll();
</script>
</body>
</html>
