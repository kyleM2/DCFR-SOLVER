<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basepoker All-in or Fold GTO Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg-0: #0a1628;
    --bg-1: #0f1d30;
    --bg-2: #142538;
    --bg-3: #1a2d4200;
    --border: #1e3a5c;
    --border-active: #2a5f8f;
    --text-primary: #e8ecf0;
    --text-secondary: #7a9bb8;
    --text-muted: #3d6080;
    --accent: #018F69;
    --accent-glow: rgba(1,143,105,0.15);

    --c-pure-push: #017a5a;
    --c-high-push: #018F69;
    --c-med-high: #2ab88e;
    --c-mixed: #f0b429;
    --c-med-low: #e87040;
    --c-low: #d45050;
    --c-pure-fold: #1a2d42;
    --c-fold-red: #c43030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-0);
    color: var(--text-primary);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.2;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }

  /* Header */
  .header {
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .header .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Control bar */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
    align-items: flex-start;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .control-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-left: 2px;
  }

  .btn-group {
    display: flex;
    gap: 4px;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .btn:hover {
    background: var(--bg-3);
    border-color: var(--border-active);
    color: var(--text-primary);
  }
  .btn.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px;
    align-items: start;
  }

  /* Grid area */
  .grid-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .grid-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .grid-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .push-pct-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }
  .push-pct-badge span {
    color: var(--c-high-push);
    font-size: 16px;
    font-weight: 500;
  }

  /* The 13x13 grid */
  .hand-grid-wrapper {
    overflow: auto;
  }

  .hand-grid {
    display: grid;
    grid-template-columns: 20px repeat(13, 1fr);
    grid-template-rows: 20px repeat(13, 1fr);
    gap: 2px;
    min-width: 460px;
  }

  .grid-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .hand-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    border: 1px solid rgba(0,0,0,0.3);
    overflow: hidden;
  }

  .hand-cell:hover {
    transform: scale(1.08);
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .hand-cell.selected {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    z-index: 5;
  }

  .cell-name {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .cell-pct {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
    line-height: 1;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--bg-1);
    border: 1px solid var(--border-active);
    border-radius: 8px;
    padding: 10px 14px;
    pointer-events: none;
    z-index: 1000;
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    min-width: 130px;
  }
  .tooltip.visible { display: block; }
  .tooltip-hand {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }
  .tooltip-pct {
    font-size: 13px;
    color: var(--c-high-push);
  }
  .tooltip-action {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Side panel */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }

  .panel-card h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .stat-row:last-child { margin-bottom: 0; }
  .stat-label { color: var(--text-secondary); }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--text-primary);
  }
  .stat-value.green { color: var(--c-high-push); }
  .stat-value.red { color: var(--c-fold-red); }
  .stat-value.yellow { color: var(--c-mixed); }

  /* Selected hand detail */
  .selected-hand-card {
    background: var(--bg-1);
    border: 1px solid var(--border-active);
    border-radius: 10px;
    padding: 18px;
    min-height: 100px;
  }
  .selected-hand-card h3 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .selected-hand-name {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 8px;
    word-break: keep-all;
    white-space: nowrap;
  }
  .selected-hand-pct {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .selected-hand-type {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  /* Bar chart for push pct */
  .pct-bar-container {
    margin-top: 10px;
    height: 6px;
    background: var(--bg-2);
    border-radius: 3px;
    overflow: hidden;
  }
  .pct-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  /* Top hands lists */
  .hand-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hand-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 8px;
    border-radius: 5px;
    background: var(--bg-2);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .hand-list-item:hover { background: var(--bg-3); }
  .hand-list-item .hl-name { color: var(--text-primary); font-weight: 500; }
  .hand-list-item .hl-pct { color: var(--text-secondary); }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }
  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* No data state */
  .no-data {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
    }
    .side-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (max-width: 600px) {
    .side-panel {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<div class="container">
  <header class="header">
    <h1>Basepoker All-in or Fold GTO Viewer</h1>
    <span class="subtitle">8bb &#x2022; 1bb ante &#x2022; Nash equilibrium</span>
  </header>

  <div class="controls">
    <div class="control-group">
      <span class="control-label">Players</span>
      <div class="btn-group" id="players-group">
        <button class="btn" data-players="2">2-max</button>
        <button class="btn" data-players="3">3-max</button>
        <button class="btn" data-players="4">4-max</button>
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">Position</span>
      <div class="btn-group" id="position-group"></div>
    </div>
    <div class="control-group">
      <span class="control-label">Situation</span>
      <div class="btn-group" id="situation-group"></div>
    </div>
  </div>

  <div class="main">
    <div class="grid-section">
      <div class="grid-header">
        <span class="grid-title" id="grid-title">Push or Fold</span>
        <span class="push-pct-badge">Push range: <span id="push-pct-display">—</span>%</span>
      </div>
      <div class="hand-grid-wrapper">
        <div class="hand-grid" id="hand-grid"></div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#017a5a"></div>90–100%</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#018F69"></div>70–90%</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#2ab88e"></div>50–70%</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#f0b429"></div>30–50%</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#e87040"></div>10–30%</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#d45050"></div>3–10%</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#1a2d42"></div>0–3%</div>
      </div>
    </div>

    <div class="side-panel">
      <div class="selected-hand-card" id="selected-card">
        <h3>Selected Hand</h3>
        <div style="color:var(--text-muted);font-family:'DM Mono',monospace;font-size:12px;">Click any cell</div>
      </div>

      <div class="panel-card">
        <h3>Range Stats</h3>
        <div class="stat-row">
          <span class="stat-label">Overall push</span>
          <span class="stat-value green" id="stat-push-pct">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Pure push (&gt;97%)</span>
          <span class="stat-value green" id="stat-pure-push">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Pure fold (&lt;3%)</span>
          <span class="stat-value red" id="stat-pure-fold">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Mixed (3–97%)</span>
          <span class="stat-value yellow" id="stat-mixed">—</span>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-hand" id="tt-hand"></div>
  <div class="tooltip-pct" id="tt-pct"></div>
  <div class="tooltip-action" id="tt-action"></div>
</div>

    r1: name[0],
    r2: name[1],
    type: suited ? 'suited' : 'offsuit'
  };
}

function canonicalName(row, col) {
  // row = index into RANKS (0=A), col = index into RANKS (0=A)
  // Above diagonal (col > row) = suited: RANKS[row]+RANKS[col]+'s'
  // Below diagonal (col < row) = offsuit: RANKS[col]+RANKS[row]+'o'
  // Diagonal (col === row) = pair: RANKS[row]+RANKS[row]
  if (row === col) return RANKS[row] + RANKS[row];
  if (col > row) return RANKS[row] + RANKS[col] + 's'; // above diagonal = suited
  return RANKS[col] + RANKS[row] + 'o'; // below diagonal = offsuit
}

function buildHandMap(hands) {
  const map = {};
  for (const h of hands) {
    map[h.hand] = h.push;
  }
  return map;
}

// ─── Current data ────────────────────────────────────────────────────────────
function currentSituation() {
  const d = DATA[state.players];
  const pos = d.positions[state.posIdx];
  const sit = pos.situations[state.sitIdx];
  return { pos, sit };
}

// ─── Render controls ─────────────────────────────────────────────────────────
function renderPositionButtons() {
  const d = DATA[state.players];
  const grp = document.getElementById('position-group');
  grp.innerHTML = '';
  d.positions.forEach((pos, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (i === state.posIdx ? ' active' : '');
    btn.textContent = pos.name;
    btn.dataset.posIdx = i;
    btn.addEventListener('click', () => {
      state.posIdx = i;
      state.sitIdx = 0;
      state.selectedHand = null;
      renderPositionButtons();
      renderSituationButtons();
      renderGrid();
      renderStats();
      clearSelectedCard();
    });
    grp.appendChild(btn);
  });
}

function renderSituationButtons() {
  const d = DATA[state.players];
  const pos = d.positions[state.posIdx];
  const grp = document.getElementById('situation-group');
  grp.innerHTML = '';
  pos.situations.forEach((sit, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn' + (i === state.sitIdx ? ' active' : '');
    const label = sit.facing === 'no action' ? 'No action' : 'vs ' + sit.facing.replace(' push', ' push');
    btn.textContent = label;
    btn.dataset.sitIdx = i;
    btn.addEventListener('click', () => {
      state.sitIdx = i;
      state.selectedHand = null;
      renderSituationButtons();
      renderGrid();
      renderStats();
      clearSelectedCard();
    });
    grp.appendChild(btn);
  });
}

// ─── Render grid ──────────────────────────────────────────────────────────────
function renderGrid() {
  const { pos, sit } = currentSituation();
  const handMap = buildHandMap(sit.hands);
  const grid = document.getElementById('hand-grid');
  grid.innerHTML = '';

  // Title
  document.getElementById('grid-title').textContent =
    pos.name + ' — ' + (sit.facing === 'no action' ? 'No action ahead' : 'Facing ' + sit.facing);
  document.getElementById('push-pct-display').textContent = sit.push_pct.toFixed(1);

  // Top-left corner spacer
  const corner = document.createElement('div');
  grid.appendChild(corner);

  // Column labels
  RANKS.forEach(r => {
    const lbl = document.createElement('div');
    lbl.className = 'grid-label';
    lbl.textContent = r;
    grid.appendChild(lbl);
  });

  // Rows
  RANKS.forEach((rowRank, ri) => {
    // Row label
    const rowLbl = document.createElement('div');
    rowLbl.className = 'grid-label';
    rowLbl.textContent = rowRank;
    grid.appendChild(rowLbl);

    // Cells
    RANKS.forEach((colRank, ci) => {
      const handName = canonicalName(ri, ci);
      const push = handMap[handName] ?? 0;
      const cell = document.createElement('div');
      cell.className = 'hand-cell';
      if (handName === state.selectedHand) cell.classList.add('selected');

      const bg = getCellColor(push);
      cell.style.background = bg;

      const nameEl = document.createElement('div');
      nameEl.className = 'cell-name';
      nameEl.textContent = handName;

      const pctEl = document.createElement('div');
      pctEl.className = 'cell-pct';
      pctEl.textContent = push >= 0.005 ? (push * 100).toFixed(0) + '%' : '';

      cell.appendChild(nameEl);
      cell.appendChild(pctEl);

      // Hover
      cell.addEventListener('mouseenter', (e) => showTooltip(e, handName, push));
      cell.addEventListener('mousemove', (e) => moveTooltip(e));
      cell.addEventListener('mouseleave', hideTooltip);

      // Click
      cell.addEventListener('click', () => {
        state.selectedHand = state.selectedHand === handName ? null : handName;
        document.querySelectorAll('.hand-cell').forEach(c => c.classList.remove('selected'));
        if (state.selectedHand) {
          cell.classList.add('selected');
          renderSelectedCard(handName, push);
        } else {
          clearSelectedCard();
        }
        // also highlight in top lists
        highlightTopList(state.selectedHand);
      });

      grid.appendChild(cell);
    });
  });
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(e, hand, push) {
  document.getElementById('tt-hand').textContent = hand;
  const pct = (push * 100).toFixed(2) + '%';
  document.getElementById('tt-pct').textContent = 'Push: ' + pct;
  const action = push >= 0.97 ? 'Pure push' :
                 push <= 0.03 ? 'Pure fold' :
                 'Mixed strategy';
  document.getElementById('tt-action').textContent = action;
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  const x = e.clientX + 16;
  const y = e.clientY - 10;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 8 : x) + 'px';
  tooltip.style.top = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
}
function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function renderStats() {
  const { sit } = currentSituation();
  const hands = sit.hands;
  let purePush = 0, pureFold = 0, mixed = 0;
  for (const h of hands) {
    if (h.push >= 0.97) purePush++;
    else if (h.push <= 0.03) pureFold++;
    else mixed++;
  }
  document.getElementById('stat-push-pct').textContent = sit.push_pct.toFixed(1) + '%';
  document.getElementById('stat-pure-push').textContent = purePush + ' hands';
  document.getElementById('stat-pure-fold').textContent = pureFold + ' hands';
  document.getElementById('stat-mixed').textContent = mixed + ' hands';

  // Top 5 push hands (highest push, non-pure-fold)
  const sorted = [...hands].sort((a, b) => b.push - a.push);
  renderHandList('top-push-list', sorted.slice(0, 6));

  // Top 5 fold hands (lowest push that are not pure push)
  const foldSorted = [...hands].sort((a, b) => a.push - b.push);
  // Show pure fold ones first, then near-fold
  renderHandList('top-fold-list', foldSorted.slice(0, 6));
}

function renderHandList(id, hands) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  for (const h of hands) {
    const item = document.createElement('div');
    item.className = 'hand-list-item';
    item.dataset.hand = h.hand;
    const nameEl = document.createElement('span');
    nameEl.className = 'hl-name';
    nameEl.textContent = h.hand;
    const pctEl = document.createElement('span');
    pctEl.className = 'hl-pct';
    pctEl.textContent = (h.push * 100).toFixed(1) + '%';
    pctEl.style.color = getCellColor(h.push);
    item.appendChild(nameEl);
    item.appendChild(pctEl);
    item.addEventListener('click', () => {
      state.selectedHand = h.hand;
      renderGrid();
      renderSelectedCard(h.hand, h.push);
      highlightTopList(h.hand);
    });
    el.appendChild(item);
  }
}

function highlightTopList(handName) {
  document.querySelectorAll('.hand-list-item').forEach(item => {
    item.style.outline = item.dataset.hand === handName ? '1px solid var(--accent)' : '';
  });
}

// ─── Selected card ────────────────────────────────────────────────────────────
function renderSelectedCard(hand, push) {
  const card = document.getElementById('selected-card');
  const pct = push * 100;
  const color = getCellColor(push);
  const action = pct >= 97 ? 'Pure push' :
                 pct <= 3 ? 'Pure fold' :
                 'Mixed strategy';
  const handInfo = parseHand(hand);
  const typeLabel = handInfo.type === 'pair' ? 'Pocket pair' :
                    handInfo.type === 'suited' ? 'Suited' : 'Offsuit';

  card.innerHTML = `
    <h3>Selected Hand</h3>
    <div class="selected-hand-name">${hand}</div>
    <div class="selected-hand-pct" style="color:${color}">${pct.toFixed(2)}%</div>
    <div class="selected-hand-type">${typeLabel} &bull; ${action}</div>
    <div class="pct-bar-container">
      <div class="pct-bar-fill" style="width:${pct}%;background:${color}"></div>
    </div>
  `;
}

function clearSelectedCard() {
  const card = document.getElementById('selected-card');
  card.innerHTML = '<h3>Selected Hand</h3><div style="color:var(--text-muted);font-family:DM Mono,monospace;font-size:12px;">Click any cell</div>';
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('players-group').querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.players = parseInt(btn.dataset.players);
    state.posIdx = 0;
    state.sitIdx = 0;
    state.selectedHand = null;
    document.querySelectorAll('#players-group .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPositionButtons();
    renderSituationButtons();
    renderGrid();
    renderStats();
    clearSelectedCard();
  });
});

// Default: 2 players active
document.querySelector('[data-players="2"]').classList.add('active');
renderPositionButtons();
renderSituationButtons();
renderGrid();
renderStats();
</script>
</body>
